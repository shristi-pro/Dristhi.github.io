<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | Dristhi Engineering</title>
  <style>
    :root {
      --navy: #1B2A6B;
      --navy-dark: #111d50;
      --navy-light: #2a3d8f;
      --gold: #D4A017;
      --gold-light: #f0c040;
      --grey: #6B7280;
      --grey-light: #8A9099;
      --white: #ffffff;
      --off-white: #F8F9FC;
      --dark-text: #1a1a2e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--off-white);
      color: var(--dark-text);
    }

    /* TOP BAR */
    .topbar {
      background: linear-gradient(135deg, var(--navy-dark), var(--navy));
      color: var(--white);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .topbar-left img {
      height: 48px;
      width: auto;
      object-fit: contain;
    }

    .topbar-left h1 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .topbar-left span {
      font-size: 0.8rem;
      color: var(--gold-light);
      display: block;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-logout {
      background: rgba(255,255,255,0.15);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
      transition: background 0.3s;
    }

    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    .btn-view-site {
      background: var(--gold);
      color: var(--white);
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.3s;
    }

    .btn-view-site:hover { background: var(--gold-light); }

    /* TABS */
    .tabs {
      display: flex;
      gap: 0;
      background: var(--white);
      border-bottom: 2px solid #e0e4f0;
      padding: 0 32px;
    }

    .tab-btn {
      padding: 16px 28px;
      border: none;
      background: none;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--grey);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.3s;
    }

    .tab-btn.active {
      color: var(--navy);
      border-bottom-color: var(--gold);
    }

    /* MAIN CONTENT */
    .dashboard-content {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .section-panel { display: none; }
    .section-panel.active { display: block; }

    /* FORM CARD */
    .form-card {
      background: var(--white);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(27,42,107,0.08);
      margin-bottom: 32px;
    }

    .form-card h3 {
      color: var(--navy);
      font-size: 1.2rem;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--gold);
      display: inline-block;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid #e0e4f0;
      border-radius: 8px;
      font-size: 0.93rem;
      color: var(--dark-text);
      outline: none;
      transition: border-color 0.3s;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--navy);
    }

    .form-group textarea { resize: vertical; min-height: 100px; }

    .image-preview {
      margin-top: 10px;
      border-radius: 8px;
      overflow: hidden;
      max-height: 200px;
    }

    .image-preview img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    .btn-submit {
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      color: var(--white);
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .btn-submit:hover { opacity: 0.9; }

    .success-msg {
      background: #f0fff4;
      color: #276749;
      border: 1px solid #b2f5cb;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.88rem;
      margin-top: 12px;
      display: none;
    }

    /* ITEMS LIST */
    .items-card {
      background: var(--white);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(27,42,107,0.08);
    }

    .items-card h3 {
      color: var(--navy);
      font-size: 1.2rem;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--gold);
      display: inline-block;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .item-row:last-child { border-bottom: none; }

    .item-thumb {
      width: 64px;
      height: 48px;
      object-fit: cover;
      border-radius: 6px;
      background: var(--off-white);
      flex-shrink: 0;
    }

    .item-info { flex: 1; }

    .item-info h4 {
      color: var(--navy);
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .item-info p {
      color: var(--grey);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 400px;
    }

    .btn-delete {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6cb;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .btn-delete:hover { background: #ffe0e0; }

    .empty-list {
      text-align: center;
      padding: 40px;
      color: var(--grey);
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; gap: 12px; text-align: center; }
      .tabs { padding: 0 12px; }
      .tab-btn { padding: 14px 16px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <img src="Images/logo.png" >
      <img src="../Images/Logo.png" alt="Logo">
      <div>
        <h1>Admin Dashboard</h1>
        <span>Dristhi Engineering and Construction</span>
      </div>
    </div>
    <div class="topbar-right">
      <a href="../index.html" class="btn-view-site" target="_blank">View Site</a>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('projects')">🏗️ Projects</button>
    <button class="tab-btn" onclick="switchTab('blogs')">📝 Blogs</button>
  </div>

  <!-- DASHBOARD CONTENT -->
  <div class="dashboard-content">

    <!-- PROJECTS PANEL -->
    <div class="section-panel active" id="panel-projects">

      <div class="form-card">
        <h3>Add New Project</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Project Title *</label>
            <input type="text" id="p-title" placeholder="e.g. Residential Building, Dhanusha" />
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="p-category">
              <option value="Residential">Residential</option>
              <option value="Commercial">Commercial</option>
              <option value="Infrastructure">Infrastructure</option>
              <option value="Institutional">Institutional</option>
              <option value="Industrial">Industrial</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Description *</label>
            <textarea id="p-desc" placeholder="Brief description of the project..."></textarea>
          </div>
          <div class="form-group">
            <label>Location</label>
            <input type="text" id="p-location" placeholder="e.g. Janakpur, Dhanusha" />
          </div>
          <div class="form-group">
            <label>Year Completed</label>
            <input type="text" id="p-year" placeholder="e.g. 2024" />
          </div>
          <div class="form-group full">
            <label>Project Image</label>
            <input type="file" id="p-image" accept="image/*" onchange="previewImage('p-image','p-preview')" />
            <div class="image-preview" id="p-preview"></div>
          </div>
        </div>
        <button class="btn-submit" onclick="addProject()">Add Project</button>
        <div class="success-msg" id="p-success">✅ Project added successfully!</div>
      </div>

      <div class="items-card">
        <h3>All Projects</h3>
        <div id="projects-list"></div>
      </div>

    </div>

    <!-- BLOGS PANEL -->
    <div class="section-panel" id="panel-blogs">

      <div class="form-card">
        <h3>Add New Blog</h3>
        <div class="form-row">
          <div class="form-group full">
            <label>Blog Title *</label>
            <input type="text" id="b-title" placeholder="e.g. Top Construction Trends in Nepal 2025" />
          </div>
          <div class="form-group full">
            <label>Short Description *</label>
            <textarea id="b-desc" placeholder="Brief summary of the blog post..."></textarea>
          </div>
          <div class="form-group">
            <label>Author</label>
            <input type="text" id="b-author" placeholder="e.g. Dristhi Engineering Team" />
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="b-date" />
          </div>
          <div class="form-group full">
            <label>Blog Cover Image</label>
            <input type="file" id="b-image" accept="image/*" onchange="previewImage('b-image','b-preview')" />
            <div class="image-preview" id="b-preview"></div>
          </div>
        </div>
        <button class="btn-submit" onclick="addBlog()">Add Blog</button>
        <div class="success-msg" id="b-success">✅ Blog added successfully!</div>
      </div>

      <div class="items-card">
        <h3>All Blogs</h3>
        <div id="blogs-list"></div>
      </div>

    </div>

  </div>

  <script>
    // Auth check
    if (sessionStorage.getItem('drishti_admin') !== 'true') {
      window.location.href = 'login.html';
    }

    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
    }

    // Logout
    function logout() {
      sessionStorage.removeItem('drishti_admin');
      window.location.href = 'login.html';
    }

    // Image preview
    function previewImage(inputId, previewId) {
      const file = document.getElementById(inputId).files[0];
      const preview = document.getElementById(previewId);
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
      };
      reader.readAsDataURL(file);
    }

    // Format date
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // ---- PROJECTS ----
    function getProjects() {
      return JSON.parse(localStorage.getItem('drishti_projects') || '[]');
    }

    function saveProjects(projects) {
      localStorage.setItem('drishti_projects', JSON.stringify(projects));
    }

    function addProject() {
      const title = document.getElementById('p-title').value.trim();
      const desc = document.getElementById('p-desc').value.trim();
      if (!title || !desc) { alert('Please fill in Title and Description.'); return; }

      const imageFile = document.getElementById('p-image').files[0];
      const save = (imageData) => {
        const project = {
          id: Date.now(),
          title,
          description: desc,
          category: document.getElementById('p-category').value,
          location: document.getElementById('p-location').value.trim(),
          year: document.getElementById('p-year').value.trim(),
          image: imageData || ''
        };
        const projects = getProjects();
        projects.unshift(project);
        saveProjects(projects);
        renderProjects();
        document.getElementById('p-title').value = '';
        document.getElementById('p-desc').value = '';
        document.getElementById('p-location').value = '';
        document.getElementById('p-year').value = '';
        document.getElementById('p-image').value = '';
        document.getElementById('p-preview').innerHTML = '';
        const msg = document.getElementById('p-success');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
      };

      if (imageFile) {
        const reader = new FileReader();
        reader.onload = (e) => save(e.target.result);
        reader.readAsDataURL(imageFile);
      } else {
        save('');
      }
    }

    function deleteProject(id) {
      if (!confirm('Delete this project?')) return;
      const projects = getProjects().filter(p => p.id !== id);
      saveProjects(projects);
      renderProjects();
    }

    function renderProjects() {
      const list = document.getElementById('projects-list');
      const projects = getProjects();
      if (projects.length === 0) {
        list.innerHTML = '<div class="empty-list">No projects added yet.</div>';
        return;
      }
      list.innerHTML = projects.map(p => `
        <div class="item-row">
          ${p.image ? `<img class="item-thumb" src="${p.image}" alt="${p.title}">` : '<div class="item-thumb"></div>'}
          <div class="item-info">
            <h4>${p.title} <span style="color:var(--gold);font-size:0.8rem;">[${p.category}]</span></h4>
            <p>${p.description}</p>
          </div>
          <button class="btn-delete" onclick="deleteProject(${p.id})">Delete</button>
        </div>
      `).join('');
    }

    // ---- BLOGS ----
    function getBlogs() {
      return JSON.parse(localStorage.getItem('drishti_blogs') || '[]');
    }

    function saveBlogs(blogs) {
      localStorage.setItem('drishti_blogs', JSON.stringify(blogs));
    }

    function addBlog() {
      const title = document.getElementById('b-title').value.trim();
      const desc = document.getElementById('b-desc').value.trim();
      if (!title || !desc) { alert('Please fill in Title and Description.'); return; }

      const imageFile = document.getElementById('b-image').files[0];
      const save = (imageData) => {
        const blog = {
          id: Date.now(),
          title,
          description: desc,
          author: document.getElementById('b-author').value.trim(),
          date: formatDate(document.getElementById('b-date').value),
          image: imageData || ''
        };
        const blogs = getBlogs();
        blogs.unshift(blog);
        saveBlogs(blogs);
        renderBlogs();
        document.getElementById('b-title').value = '';
        document.getElementById('b-desc').value = '';
        document.getElementById('b-author').value = '';
        document.getElementById('b-date').value = '';
        document.getElementById('b-image').value = '';
        document.getElementById('b-preview').innerHTML = '';
        const msg = document.getElementById('b-success');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
      };

      if (imageFile) {
        const reader = new FileReader();
        reader.onload = (e) => save(e.target.result);
        reader.readAsDataURL(imageFile);
      } else {
        save('');
      }
    }

    function deleteBlog(id) {
      if (!confirm('Delete this blog?')) return;
      const blogs = getBlogs().filter(b => b.id !== id);
      saveBlogs(blogs);
      renderBlogs();
    }

    function renderBlogs() {
      const list = document.getElementById('blogs-list');
      const blogs = getBlogs();
      if (blogs.length === 0) {
        list.innerHTML = '<div class="empty-list">No blogs added yet.</div>';
        return;
      }
      list.innerHTML = blogs.map(b => `
        <div class="item-row">
          ${b.image ? `<img class="item-thumb" src="${b.image}" alt="${b.title}">` : '<div class="item-thumb"></div>'}
          <div class="item-info">
            <h4>${b.title}</h4>
            <p>${b.date ? b.date + ' — ' : ''}${b.description}</p>
          </div>
          <button class="btn-delete" onclick="deleteBlog(${b.id})">Delete</button>
        </div>
      `).join('');
    }

    // Init
    renderProjects();
    renderBlogs();
  </script>

</body>
</html>
